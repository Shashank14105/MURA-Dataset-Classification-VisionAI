<!DOCTYPE html>
<html lang="en" data-theme="light" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>MURA Medical Image Classification Cover</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            background-image: url("https://page.gensparksite.com/slides_images/f928487642d7559953f53b94f52ccd34.webp");
            background-size: cover;
            background-position: center;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.85);
        }
        .content-wrapper {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 80px;
        }
        .accent-line {
            width: 80px;
            height: 6px;
            background-color: #38bdf8;
            margin-bottom: 24px;
        }
        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 64px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
            color: #f8fafc;
        }
        .subtitle {
            font-size: 28px;
            font-weight: 300;
            color: #bae6fd;
            margin-bottom: 48px;
            max-width: 800px;
        }
        .tagline-box {
            display: inline-flex;
            align-items: center;
            background-color: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px;
            padding: 12px 24px;
            margin-bottom: 40px;
            width: fit-content;
        }
        .tagline-icon {
            color: #38bdf8;
            margin-right: 12px;
            font-size: 20px;
        }
        .tagline-text {
            color: #e0f2fe;
            font-weight: 500;
            font-size: 18px;
        }
        .meta-info {
            display: flex;
            gap: 40px;
            font-size: 16px;
            color: #94a3b8;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            padding-top: 32px;
            margin-top: auto;
            margin-bottom: 60px;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .meta-icon {
            color: #38bdf8;
        }
        .grid-pattern {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 40%;
            height: 100%;
            background-image: radial-gradient(rgba(56, 189, 248, 0.2) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.3;
            z-index: 1;
        }
        .medical-graphic {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            width: 450px;
            height: 450px;
            background-color: rgba(56, 189, 248, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(56, 189, 248, 0.2);
            z-index: 5;
        }
        .inner-graphic {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            border: 1px dashed rgba(56, 189, 248, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .pulse-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(56, 189, 248, 0.1);
        }
    </style>

<body style="">
<div class="slide-container">
<div class="overlay"></div>
<div class="grid-pattern"></div>
<div class="medical-graphic">
<div class="inner-graphic">
<i class="fa-solid fa-x-ray" style="font-size: 120px; color: rgba(56, 189, 248, 0.8);"></i>
<div class="pulse-circle"></div>
</div>
<!-- Floating nodes representing neural network / AI -->
<i class="fa-solid fa-circle-nodes" style="position: absolute; top: 20%; right: 15%; color: #38bdf8; font-size: 24px; opacity: 0.6;"></i>
<i class="fa-solid fa-brain" style="position: absolute; bottom: 20%; left: 15%; color: #38bdf8; font-size: 24px; opacity: 0.6;"></i>
<i class="fa-solid fa-microscope" style="position: absolute; top: 15%; left: 40%; color: #38bdf8; font-size: 20px; opacity: 0.4;"></i>
</div>
<div class="content-wrapper">
<div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
<div class="accent-line"></div>
<h1 class="title">MediSkeletal Ai Vision</h1><h1 class="title"><span style="color: rgb(186, 230, 253); font-size: 28px; font-weight: 300; font-family: Inter, sans-serif;">Deep Learning for Musculoskeletal Radiographs</span></h1>
<div class="tagline-box">
<i class="fa-solid fa-robot tagline-icon"></i>
<span class="tagline-text">AI-assisted screening for faster, more accurate diagnosis</span>
</div>
</div>
<div class="meta-info">
<div class="meta-item">
<i class="fa-regular fa-user meta-icon"></i>
<span>Shashank Kumar (host)</span><span><br></span>
</div>
<div class="meta-item">
<i class="fa-solid fa-university meta-icon"></i>
<span>VIT Bhopal University</span>
</div>
<div class="meta-item">
<span><br></span>
</div>
</div>
</div>
</div>

</body></html>
