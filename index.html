<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>X-ray Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 400px;
      text-align: center;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    #output {
      margin-top: 20px;
      text-align: left;
      font-size: 14px;
      color: #333;
      white-space: pre-line;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>X-ray Analysis Assistant</h2>
  <p>Click below to get guidance</p>
  <button onclick="analyze()">Analyze</button>
  <div id="output"></div>
</div>

<script>
async function analyze() {
  const output = document.getElementById("output");
  output.innerHTML = "Analyzing...";

  const prompts = [
    "Give short general advice (5-6 lines) for a possible bone injury. Keep it simple.",
    "Provide brief guidance for a suspected fracture. Avoid details and keep it under 5-6 lines.",
    "Give short precautions for a possible bone issue. Keep it general and concise.",
    "Suggest simple first-step advice after an abnormal X-ray. Max 5-6 lines.",
    "Give quick doctor-like advice for a minor bone injury. Keep it short."
  ];

  const randomPrompt = prompts[Math.floor(Math.random() * prompts.length)];

  try {
    const response = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=AIzaSyDF5KIr7mW9uLvhvTV1zvM1FH_So0ioGzo",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: [
            {
              parts: [{ text: randomPrompt }]
            }
          ]
        })
      }
    );

    const data = await response.json();
    console.log("API Response:", data); // debug

    if (!response.ok) {
      const errorMessage = data.error?.message || `HTTP Error ${response.status}`;
      output.innerHTML = `<strong>API Error:</strong> ${errorMessage}`;
      return;
    }

    const text =
      data.candidates?.[0]?.content?.parts?.[0]?.text ||
      "No response received.";

    output.innerHTML = text;

  } catch (error) {
    console.error("Network/Fetch Error:", error);
    output.innerHTML = "Error: Failed to fetch response. Please check your network connection.";
  }
}
</script>

</body>
</html>
